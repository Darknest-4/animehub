<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visszajelzés – AnimeHub</title>

  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link rel="stylesheet" href="css/base.css?v=8">
  <link rel="stylesheet" href="css/feedback.css?v=8">
</head>
<body data-page="feedback">

  <!-- ===== Topbar (layout.js tölti fel) ===== -->
  <header id="appTopbar" class="topbar"></header>

  <div class="layout">

    <!-- ===== Sidebar (layout.js tölti fel) ===== -->
    <aside id="appSidebar" class="sidebar"></aside>

    <!-- ===== Fő tartalom ===== -->
    <main class="main">
      <div class="feedback-grid">

        <!-- ===== Bal oszlop ===== -->
        <div>

          <header class="fb-head">
            <h1>Visszajelzés</h1>
            <p class="subtitle">Segíts nekünk jobbá tenni az AnimeHub-ot!</p>
          </header>

          <!-- Típus kártyák -->
          <div class="fb-cards">
            <button class="fb-card" data-compose="Ötlet">
              <span class="ic">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.4 1 2.3h6c0-.9.4-1.8 1-2.3A7 7 0 0 0 12 2z"/></svg>
              </span>
              <div>
                <h3>Oszd meg az ötleted</h3>
                <p>Van egy jó ötleted vagy javaslatod? Írd meg nekünk!</p>
              </div>
            </button>
            <button class="fb-card" data-compose="Hiba">
              <span class="ic">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="6" width="8" height="14" rx="4"/><path d="m19 7-3 2"/><path d="m5 7 3 2"/><path d="m19 19-3-2"/><path d="m5 19 3-2"/><path d="M20 13h-4"/><path d="M4 13h4"/><path d="m10 4 1 2"/><path d="m14 4-1 2"/></svg>
              </span>
              <div>
                <h3>Jelents egy hibát</h3>
                <p>Találtál valamilyen hibát? Segíts, hogy kijavíthassuk!</p>
              </div>
            </button>
            <button class="fb-card" data-compose="Vélemény">
              <span class="ic">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              </span>
              <div>
                <h3>Mondd el a véleményed</h3>
                <p>Mit szeretsz az AnimeHub-ban? Mit csinálnánk másképp?</p>
              </div>
            </button>
          </div>

          <!-- Fülek + rendezés -->
          <div class="fb-toolbar">
            <span id="fbTabs" style="display:contents"></span>
            <button class="filter-select sort" id="fbSort"><span>Legújabb</span>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
          </div>

          <!-- Új visszajelzés űrlap (kártyára kattintva nyílik) -->
          <div class="fb-composer" id="fbComposer">
            <h3>Új visszajelzés – <span id="composerType">Ötlet</span></h3>
            <input type="text" id="fbTitle" placeholder="Rövid cím...">
            <textarea id="fbBody" placeholder="Írd le részletesen..."></textarea>
            <div class="foot">
              <button class="btn-secondary" id="fbCancel">Mégse</button>
              <button class="btn-primary" id="fbSubmit">Beküldés</button>
            </div>
          </div>

          <!-- Visszajelzés lista (feedback.js rendereli) -->
          <div id="fbList"></div>

        </div>

        <!-- ===== Jobb oszlop ===== -->
        <aside>

          <!-- Új visszajelzés küldése -->
          <section class="panel">
            <div class="panel-head"><h3>Új visszajelzés küldése</h3></div>
            <p style="font-size:13px;color:var(--text-soft);margin-bottom:14px">
              Válaszd ki, milyen típusú visszajelzést szeretnél küldeni.
            </p>
            <button class="fb-type-btn" data-compose="Ötlet">
              <span class="ic i1">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.4 1 2.3h6c0-.9.4-1.8 1-2.3A7 7 0 0 0 12 2z"/></svg>
              </span>
              <div>
                <h4>Ötlet küldése</h4>
                <p>Új funkció vagy fejlesztési javaslat</p>
              </div>
            </button>
            <button class="fb-type-btn" data-compose="Hiba">
              <span class="ic i2">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="6" width="8" height="14" rx="4"/><path d="m19 7-3 2"/><path d="m5 7 3 2"/><path d="m19 19-3-2"/><path d="m5 19 3-2"/><path d="M20 13h-4"/><path d="M4 13h4"/><path d="m10 4 1 2"/><path d="m14 4-1 2"/></svg>
              </span>
              <div>
                <h4>Hiba bejelentése</h4>
                <p>Találtál egy hibát? Szólj nekünk!</p>
              </div>
            </button>
            <button class="fb-type-btn" data-compose="Vélemény">
              <span class="ic i3">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z"/></svg>
              </span>
              <div>
                <h4>Vélemény megosztása</h4>
                <p>Mondd el a gondolataidat!</p>
              </div>
            </button>
          </section>

          <!-- Statisztikák -->
          <section class="panel">
            <div class="panel-head"><h3>Statisztikák</h3></div>
            <div id="fbStats"></div>
          </section>

          <!-- Népszerű címkék -->
          <section class="panel">
            <div class="panel-head"><h3>Népszerű címkék</h3></div>
            <div class="tag-cloud" id="fbTags"></div>
          </section>

          <!-- Köszönet -->
          <div class="thanks-box">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <p>
              <strong>Köszönjük a visszajelzéseidet!</strong>
              A közösség segítségével folyamatosan fejlesztjük az AnimeHub-ot.
            </p>
          </div>

        </aside>

      </div>
    </main>
  </div>

  <!-- ===== Szkriptek ===== -->
  <script src="js/data.js?v=8"></script>
  <script src="js/layout.js?v=8"></script>
  <script src="js/main.js?v=8"></script>
  <script src="js/feedback.js?v=8"></script>
  <script src="js/images.js?v=8"></script>
</body>
</html>

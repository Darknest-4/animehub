<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnimeHub – Kezdőlap</title>

  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link rel="stylesheet" href="css/base.css?v=13">
  <link rel="stylesheet" href="css/home.css?v=10">
  <link rel="stylesheet" href="css/anime.css?v=10"> <!-- a continue-mini komponenshez -->
</head>
<body data-page="home">

  <!-- ===== Topbar (layout.js tölti fel) ===== -->
  <header id="appTopbar" class="topbar"></header>

  <div class="layout">

    <!-- ===== Sidebar (layout.js tölti fel) ===== -->
    <aside id="appSidebar" class="sidebar"></aside>

    <!-- ===== Fő tartalom ===== -->
    <main class="main">
      <div class="home-grid">

        <!-- ===== Bal oszlop ===== -->
        <div>

          <!-- Hero carousel -->
          <section class="hero" id="hero">
            <div class="hero-nav">
              <button class="arrow-btn" id="heroPrev" aria-label="Előző dia">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              </button>
              <button class="arrow-btn" id="heroNext" aria-label="Következő dia">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
            </div>
            <div class="hero-dots" id="heroDots"></div>
          </section>

          <!-- Folytasd, ahol abbahagytad -->
          <section class="section" data-scroll-row>
            <div class="section-head">
              <span class="icon">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              </span>
              <h2>Folytasd, ahol abbahagytad</h2>
              <span class="spacer"></span>
              <button class="arrow-btn" data-prev aria-label="Balra">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              </button>
              <button class="arrow-btn" data-next aria-label="Jobbra">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
            </div>
            <div class="row-scroll continue-card" id="continueRow"></div>
          </section>

          <!-- Népszerű animék -->
          <section class="section" data-scroll-row>
            <div class="section-head">
              <span class="icon">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              </span>
              <h2>Népszerű animék</h2>
              <span class="spacer"></span>
              <button class="arrow-btn" data-prev aria-label="Balra">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              </button>
              <button class="arrow-btn" data-next aria-label="Jobbra">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
            </div>
            <div class="row-scroll poster-card" id="popularRow"></div>
          </section>

          <!-- Frissen hozzáadva -->
          <section class="section" data-scroll-row>
            <div class="section-head">
              <span class="icon">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              </span>
              <h2>Frissen hozzáadva</h2>
              <span class="spacer"></span>
              <a class="link-more" href="#">Több
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              </a>
            </div>
            <div class="row-scroll poster-card" id="freshRow"></div>
          </section>

        </div>

        <!-- ===== Jobb oszlop ===== -->
        <aside>

          <!-- Népszerű most -->
          <section class="panel">
            <div class="panel-head">
              <span class="icon hot">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 0.67s0.74 2.65 0.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l0.03-0.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5 0.67zM11.71 19c-1.78 0-3.22-1.4-3.22-3.14 0-1.62 1.05-2.76 2.81-3.12 1.77-0.36 3.6-1.21 4.62-2.58 0.39 1.29 0.59 2.65 0.59 4.04 0 2.65-2.15 4.8-4.8 4.8z"/></svg>
              </span>
              <h3>Népszerű most</h3>
              <a class="link-more" href="#">Több
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              </a>
            </div>
            <div id="topNowList"></div>
          </section>

          <!-- Mai ütemezés -->
          <section class="panel">
            <div class="panel-head">
              <span class="icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              </span>
              <h3>Mai ütemezés</h3>
              <a class="link-more" href="#">Teljes ütemező</a>
            </div>
            <div id="scheduleList"></div>
            <button class="schedule-all">Összes mai epizód</button>
          </section>

        </aside>

      </div>
    </main>
  </div>

  <!-- ===== Szkriptek ===== -->
  <script src="js/data.js?v=10"></script>
  <script src="js/layout.js?v=10"></script>
  <script src="js/effects.js?v=12"></script>
  <script src="js/main.js?v=10"></script>
  <script src="js/jikan.js?v=10"></script>
  <script src="js/home.js?v=10"></script>
  <script src="js/images.js?v=10"></script>
</body>
</html>

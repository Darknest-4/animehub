<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Közösség – AnimeHub</title>

  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link rel="stylesheet" href="css/base.css?v=4">
  <link rel="stylesheet" href="css/community.css?v=4">
</head>
<body data-page="community">

  <!-- ===== Topbar (layout.js tölti fel) ===== -->
  <header id="appTopbar" class="topbar"></header>

  <div class="layout">

    <!-- ===== Sidebar (layout.js tölti fel) ===== -->
    <aside id="appSidebar" class="sidebar"></aside>

    <!-- ===== Fő tartalom ===== -->
    <main class="main">
      <div class="community-grid">

        <!-- ===== Bal oszlop ===== -->
        <div>

          <!-- Banner -->
          <section class="comm-hero">
            <div class="backdrop"><img src="assets/img/backdrop-naruto.svg" alt=""></div>
            <h1>Közösség</h1>
            <p>Beszélgess, ossz meg, és légy része az AnimeHub közösségének!</p>
            <nav class="comm-tabs" data-tab-group>
              <button class="comm-tab active">Fórum</button>
              <button class="comm-tab">Bejegyzések</button>
              <button class="comm-tab">Kérdések</button>
            </nav>
          </section>

          <!-- Bejegyzés írása -->
          <section class="composer">
            <div class="row">
              <img src="assets/img/avatar-akatsuki.svg" alt="Akatsuki">
              <input type="text" id="composerInput" placeholder="Mi jár a fejedben?">
            </div>
            <div class="actions">
              <button class="composer-tool">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                Kép
              </button>
              <button class="composer-tool">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="3"/><path d="M8 12h.01M12 12h.01M16 12h.01"/></svg>
                GIF
              </button>
              <button class="composer-tool">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                Szavazás
              </button>
              <button class="composer-tool">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                Spoiler
              </button>
              <button class="btn-primary" id="composerSubmit">Közzététel</button>
            </div>
          </section>

          <!-- Szűrők -->
          <div class="feed-filters" id="feedFilters">
            <button class="feed-chip active" data-filter="Népszerű">Népszerű</button>
            <button class="feed-chip" data-filter="Friss">Friss</button>
            <button class="feed-chip" data-filter="Követett">Követett</button>
            <button class="feed-chip">Összes kategória
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <button class="feed-chip filters-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
              Szűrők
            </button>
          </div>

          <!-- Bejegyzések (community.js rendereli) -->
          <div id="postFeed"></div>

        </div>

        <!-- ===== Jobb oszlop ===== -->
        <aside>

          <!-- Népszerű témák -->
          <section class="panel">
            <div class="panel-head">
              <span class="icon hot">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 0.67s0.74 2.65 0.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l0.03-0.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5 0.67z"/></svg>
              </span>
              <h3>Népszerű témák</h3>
              <a class="link-more" href="#">Több
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              </a>
            </div>
            <div id="topicList"></div>
          </section>

          <!-- Jelenleg online -->
          <section class="panel">
            <div class="panel-head">
              <h3>Jelenleg online <span class="online-count">(1,254)</span></h3>
              <a class="link-more" href="team.html">Összes megtekintése</a>
            </div>
            <div class="online-row" id="onlineRow"></div>
          </section>

          <!-- Ajánlott közösségek -->
          <section class="panel">
            <div class="panel-head">
              <h3>Ajánlott közösségek</h3>
              <a class="link-more" href="#">Összes megtekintése</a>
            </div>
            <div id="recList"></div>
          </section>

        </aside>

      </div>
    </main>
  </div>

  <!-- ===== Szkriptek ===== -->
  <script src="js/data.js?v=4"></script>
  <script src="js/layout.js?v=4"></script>
  <script src="js/main.js?v=4"></script>
  <script src="js/community.js?v=4"></script>
  <script src="js/images.js?v=4"></script>
</body>
</html>
